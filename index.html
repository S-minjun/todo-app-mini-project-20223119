<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    /* 전체 배경: 다크모드 느낌 */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 50px;
    }

    /* 컨테이너 */
    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* 입력 박스 */
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
      margin-bottom: 15px;
      background-color: #2e2e2e;
      color: #fff;
    }

    /* TODO 리스트 래퍼 */
    .todo-list-wrapper {
      max-height: 300px;
      overflow-y: auto;
      padding-right: 5px;
      background: #2e2e2e; /* 박스 밝기 조정 */
      border-radius: 10px;
      transition: background 0.3s;
    }

    /* 리스트 아이템 */
    li {
      list-style: none;
      background: #3a3a3a; /* 살짝 밝게 */
      padding: 12px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      word-break: break-word;
      transition: background 0.2s;
    }

    li:hover {
      background: #4a4a4a;
    }

    .todo-title.completed {
      text-decoration: line-through;
      opacity: 0.6;
    }

    button {
      background: #ff4c4c;
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #ff6b6b;
    }

    /* 체크박스 스타일 */
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      margin-right: 10px;
    }

    /* 스크롤바 다크모드 스타일 */
    .todo-list-wrapper::-webkit-scrollbar {
      width: 6px;
    }

    .todo-list-wrapper::-webkit-scrollbar-thumb {
      background-color: #555;
      border-radius: 3px;
    }

    .todo-list-wrapper::-webkit-scrollbar-track {
      background-color: #2e2e2e;
      border-radius: 3px;
    }

    /* 반응형 */
    @media (max-width: 450px) {
      .container {
        padding: 15px;
      }
      li {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>
    <input type="text" id="todoInput" placeholder="할 일을 입력하세요..." />
    <ul class="todo-list-wrapper" id="todoList"></ul>
  </div>

  <script>
    const todoInput = document.getElementById('todoInput');
    const todoList = document.getElementById('todoList');

    // 로컬 스토리지 임시 사용
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');

    function saveTodos() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function renderTodos() {
      todoList.innerHTML = '';
      todos.forEach((todo, index) => {
        const li = document.createElement('li');

        const label = document.createElement('label');
        label.style.display = 'flex';
        label.style.alignItems = 'center';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.completed;
        checkbox.addEventListener('change', () => {
          todos[index].completed = checkbox.checked;
          saveTodos();
          renderTodos();
        });

        const span = document.createElement('span');
        span.textContent = todo.title;
        span.className = 'todo-title';
        if(todo.completed) span.classList.add('completed');

        label.appendChild(checkbox);
        label.appendChild(span);

        const delBtn = document.createElement('button');
        delBtn.textContent = '삭제';
        delBtn.addEventListener('click', () => {
          todos.splice(index, 1);
          saveTodos();
          renderTodos();
        });

        li.appendChild(label);
        li.appendChild(delBtn);
        todoList.appendChild(li);
      });
    }

    todoInput.addEventListener('keypress', (e) => {
      if(e.key === 'Enter' && todoInput.value.trim() !== '') {
        todos.push({title: todoInput.value.trim(), completed: false});
        todoInput.value = '';
        saveTodos();
        renderTodos();
      }
    });

    renderTodos();
  </script>
</body>
</html>
